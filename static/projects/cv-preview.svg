<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1240" viewBox="0 0 880 1240" role="img" aria-labelledby="title desc">
  <title id="title">Apercu du CV Alexandre Robert</title>
  <desc id="desc">Capture stylisee de la premiere page du CV</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f7ff" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f6493" />
      <stop offset="1" stop-color="#3e588a" />
    </linearGradient>
  </defs>

  <rect width="880" height="1240" rx="26" fill="url(#bg)" />
  <rect x="0" y="0" width="880" height="220" rx="26" fill="url(#header)" />

  <circle cx="108" cy="110" r="72" fill="#dfe7f8" />
  <rect x="206" y="42" width="450" height="144" rx="22" fill="#ececec" />
  <text x="432" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#222">Alexandre Robert</text>
  <text x="432" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#2f2f2f">Alternance Developpeur Web</text>

  <rect x="22" y="250" width="248" height="950" rx="20" fill="#ffffff" stroke="#8aa2d8" stroke-width="4" />
  <rect x="290" y="250" width="568" height="270" rx="20" fill="#ffffff" stroke="#8e8e9a" stroke-width="4" />
  <rect x="290" y="542" width="568" height="270" rx="20" fill="#ffffff" stroke="#8e8e9a" stroke-width="4" />
  <rect x="290" y="834" width="568" height="176" rx="20" fill="#ffffff" stroke="#8e8e9a" stroke-width="4" />
  <rect x="290" y="1028" width="274" height="172" rx="20" fill="#ffffff" stroke="#8e8e9a" stroke-width="4" />
  <rect x="584" y="1028" width="274" height="172" rx="20" fill="#ffffff" stroke="#8e8e9a" stroke-width="4" />

  <g font-family="Arial, sans-serif" fill="#1f2940">
    <text x="44" y="298" font-size="34" font-weight="700">Competences</text>
    <text x="44" y="336" font-size="24" fill="#536078">Informatique, automatisme, regulation</text>

    <text x="312" y="302" font-size="34" font-weight="700">Formations</text>
    <text x="312" y="348" font-size="24">BUT Genie Chimique Genie des Procedes</text>
    <text x="312" y="382" font-size="24">Bac STL Biotechnologies</text>

    <text x="312" y="594" font-size="34" font-weight="700">Experiences professionnelles</text>
    <text x="312" y="640" font-size="24">Orano DS, Orano Temis, Maitres Laitiers</text>

    <text x="312" y="884" font-size="34" font-weight="700">Engagements et qualites</text>
    <text x="312" y="930" font-size="24">Ambassadeur ODD, CVEC, Delegue promotion</text>

    <text x="312" y="1074" font-size="32" font-weight="700">Qualites</text>
    <text x="312" y="1118" font-size="24">Adaptabilite, Leadership, Reactivite</text>

    <text x="606" y="1074" font-size="32" font-weight="700">Loisirs</text>
    <text x="606" y="1118" font-size="24">Organisation de groupe et jeux de role</text>
  </g>

  <rect x="24" y="1168" width="832" height="50" rx="14" fill="#e5ebfa" />
  <text x="440" y="1201" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#3a4f76">
    Apercu CV - cliquez pour ouvrir le PDF
  </text>
